<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexura - Log In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">
                Nexura
            </div>
            <p style="color: var(--text-secondary); font-size: 15px;">Welcome back! Please sign in to your companion portal.</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@domain.com" required>
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 24px;">
                Sign In
            </button>
        </form>

        <div style="text-align: center; font-size: 14px; color: var(--text-secondary);">
            Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a>
        </div>
    </div>


    <script src="js/app.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const btn = event.target.querySelector("button[type='submit']");
            btn.innerText = "Signing in...";
            btn.disabled = true;

            try {
                const response = await fetchWithAuth("/api/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    setSession(data.token, data.email, data.fullName);
                    showToast("Login successful! Welcome back 👋", "success");
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 800);
                } else {
                    const error = await response.text();
                    showToast(error || "Invalid login credentials. Please try again.", "error");
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                }
            } catch (err) {
                showToast("Error: " + err.message, "error");
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
