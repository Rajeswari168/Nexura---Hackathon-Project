<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexura - Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card" style="max-width: 540px;">
        <div style="text-align: center; margin-bottom: 28px;">
            <div style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;">
                Nexura
            </div>
            <p style="color: var(--text-secondary); font-size: 14px;">Sign up today to start your personalized chronic care journey.</p>
        </div>

        <form id="register-form" onsubmit="handleRegister(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" class="form-input" placeholder="45" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@domain.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="border-top: 1px solid var(--border-color); margin: 20px 0; padding-top: 16px;">
                <p style="font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px;">Emergency Caregiver Details</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="caregiverName">Caregiver Name</label>
                        <input type="text" id="caregiverName" class="form-input" placeholder="Jane Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="caregiverPhone">Caregiver Phone</label>
                        <input type="tel" id="caregiverPhone" class="form-input" placeholder="+1234567890" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">
                Create Account
            </button>
        </form>

        <div style="text-align: center; font-size: 14px; color: var(--text-secondary);">
            Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in instead</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function handleRegister(event) {
            event.preventDefault();
            const fullName = document.getElementById("fullName").value;
            const age = parseInt(document.getElementById("age").value);
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const emergencyCaregiverName = document.getElementById("caregiverName").value;
            const caregiverPhoneNumber = document.getElementById("caregiverPhone").value;

            try {
                const response = await fetch("http://localhost:8080/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        fullName,
                        age,
                        email,
                        password,
                        emergencyCaregiverName,
                        caregiverPhoneNumber
                    })
                });

                if (response.ok) {
                    showToast("Account created successfully! Please sign in to continue.", "success");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1200);
                } else {
                    const error = await response.text();
                    showToast(error || "Registration failed. Email may already be in use.", "error");
                }
            } catch (err) {
                showToast("Server connection error during registration.", "error");
            }
        }
    </script>
</body>
</html>
