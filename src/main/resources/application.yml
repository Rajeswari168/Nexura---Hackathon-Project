server:
  port: 8080

spring:
  application:
    name: nexura
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexura}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Nexura Security and AI Settings
nexura:
  jwt:
    secret: ${JWT_SECRET:nexura_secret_key_hackathon_2026_super_secure_key_1234567890_987654321}
    expiration-ms: 86400000 # 24 Hours
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  ai:
    provider: ${AI_PROVIDER:groq} # 'groq' (primary), 'gemini', or 'openai'
    groq:
      key: ${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}
      url: https://api.groq.com/openai/v1/chat/completions
      model: llama-3.3-70b-versatile
    gemini:
      key: ${GEMINI_API_KEY:AIzaSyBS0MU54x3pYon5v4W1CUPNV6MFfbfYM_Q}
      url: https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent
    openai:
      key: ${OPENAI_API_KEY:}
      url: https://api.openai.com/v1/chat/completions
      model: gpt-4o-mini
